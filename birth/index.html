<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Happy Birthday! | Magical Celebration</title>
    <!-- Google Fonts & Simple CSS Reset -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Inter', sans-serif;
            color: #f1f1f1;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f1f;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ff9a3c;
            border-radius: 10px;
        }

        /* MAIN HERO SECTION - Full screen video cover */
        .hero-video {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }

        .hero-video video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: brightness(0.9);
        }

        .hero-text {
            animation: fadeInUp 1.5s ease;
            padding: 1.5rem;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            backdrop-filter: blur(8px);
        }

        .hero-text h1 {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFD166, #FF9F4A, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 20px rgba(0,0,0,0.2);
        }

        .hero-text p {
            font-size: 1.4rem;
            margin-top: 1rem;
            font-weight: 300;
            color: #fff7e8;
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 2rem;
            color: #ffb347;
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        /* Main content container */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2.5rem 2rem;
        }

        /* Section title styles */
        .section-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 2rem 0 1.5rem 0;
            text-align: center;
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .section-title span {
            background: linear-gradient(120deg, #ffb347, #ff6b6b);
            padding: 0 1rem;
            border-radius: 50px;
        }

        /* MUSIC PLAYER SECTION (birthday song) */
        .music-area {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 1rem 2rem;
            margin: 2rem 0 3rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            border: 1px solid rgba(255,200,100,0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .song-info i {
            font-size: 2.2rem;
            color: #ffb347;
            animation: pulse 1.8s infinite;
        }

        .song-title {
            font-weight: 600;
            font-size: 1.3rem;
        }

        .player-controls {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        .player-controls button {
            background: #ff9a3c;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            color: #1e1e2a;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .player-controls button:hover {
            background: #ffb347;
            transform: scale(1.05);
        }

        /* Photo Grid (5 photos) */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.8rem;
            margin: 2rem 0 2rem;
        }

        .photo-card {
            background: rgba(0,0,0,0.4);
            border-radius: 28px;
            overflow: hidden;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,180,70,0.5);
            box-shadow: 0 15px 25px -10px rgba(0,0,0,0.5);
        }

        .photo-card:hover {
            transform: translateY(-10px);
            border-color: #ffb347;
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: 0.3s;
        }

        .photo-card .caption {
            padding: 0.8rem;
            text-align: center;
            font-weight: 500;
            background: rgba(0,0,0,0.6);
        }

        /* Videos section: 1 big featured + 10 small videos */
        .videos-showcase {
            margin: 2rem 0;
        }

        .featured-video {
            margin: 2rem 0 2.5rem;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 25px 35px -12px black;
            background: #000;
            border: 3px solid #ffb347;
        }

        .featured-video video {
            width: 100%;
            max-height: 550px;
            object-fit: cover;
            display: block;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.8rem;
            margin-top: 1rem;
        }

        .video-card {
            background: #0f0f1c;
            border-radius: 28px;
            overflow: hidden;
            transition: 0.25s ease;
            border: 1px solid #2c2c48;
            cursor: pointer;
        }

        .video-card:hover {
            transform: scale(1.02);
            border-color: #ffa559;
            box-shadow: 0 15px 25px -8px #ff9a3c60;
        }

        .video-card video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #000;
        }

        .video-card .vid-title {
            padding: 0.6rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0,0,0,0.5);
        }

        /* footer */
        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #aaa;
            border-top: 1px solid rgba(255,215,150,0.2);
            margin-top: 3rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(15px); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.95);}
            100% { opacity: 1; transform: scale(1);}
        }

        /* Responsive */
        @media (max-width: 680px) {
            .container {
                padding: 1.5rem;
            }
            .music-area {
                flex-direction: column;
                text-align: center;
            }
            .section-title {
                font-size: 1.9rem;
            }
        }
        .empty-placeholder {
            text-align: center;
            padding: 2rem;
            background: #ffffff10;
            border-radius: 28px;
            font-style: italic;
        }
    </style>
</head>
<body>

<!-- FULL SCREEN HERO VIDEO (BIG PLACE FOR VIDEO AT START) -->
<div class="hero-video" id="heroVideoSection">
    <video id="heroBgVideo" autoplay muted loop playsinline>
        <!-- sample birthday themed video from free sample (abstract celebration) -->
        <source src="https://assets.mixkit.co/videos/preview/mixkit-happy-girl-blowing-out-candles-on-a-birthday-cake-39774-large.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    <div class="hero-overlay">
        <div class="hero-text">
            <h1>🎂 Happy Birthday! 🎉</h1>
            <p>Celebrate the magic, love & joy</p>
        </div>
    </div>
    <div class="scroll-down" onclick="document.getElementById('mainContent').scrollIntoView({behavior:'smooth'});">
        <i class="fas fa-chevron-down"></i>
    </div>
</div>

<main id="mainContent">
    <div class="container">
        <!-- Birthday Song Player Area -->
        <div class="music-area">
            <div class="song-info">
                <i class="fas fa-music"></i>
                <div class="song-title">🎵 Birthday Song Anthem 🎵</div>
            </div>
            <div class="player-controls">
                <button id="playBtn"><i class="fas fa-play"></i></button>
                <button id="pauseBtn"><i class="fas fa-pause"></i></button>
                <button id="stopBtn"><i class="fas fa-stop"></i></button>
            </div>
            <div style="font-size: 0.8rem; opacity:0.8;">✨ "Happy Birthday To You" - celebratory mix</div>
        </div>

        <!-- PHOTO SECTION: 5 PHOTOES -->
        <div>
            <div class="section-title"><span>📸 5 Beautiful Memories</span></div>
            <div class="photo-grid" id="photoGrid">
                <!-- 5 photo cards will be injected via JS, but we can also prefill with sample birthday images -->
            </div>
        </div>

        <!-- VIDEO SECTION: 1 big featured video + 10 videos -->
        <div class="videos-showcase">
            <div class="section-title"><span>🎬 Birthday Cinema</span></div>
            <!-- Big featured video place -->
            <div class="featured-video" id="featuredVideoContainer">
                <video id="featuredMainVideo" controls poster="https://picsum.photos/id/20/800/450">
                    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>

            <!-- 10 videos grid -->
            <div style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1rem; font-weight: 500;"><i class="fas fa-video"></i> 10 Special Clips</h3>
                <div class="videos-grid" id="videosGrid"></div>
            </div>
        </div>
        <footer>
            <i class="fas fa-birthday-cake"></i> Made with love for an unforgettable birthday | 🎈 Enjoy every moment
        </footer>
    </div>
</main>

<script>
    // ---------- BIRTHDAY SONG (Audio element with a free happy birthday instrumental) ----------
    // Using a free royalty-free "Happy Birthday" instrumental (from Pixabay music or similar)
    // We use a track that is openly available. For demonstration: a classic happy birthday melody.
    // In case network issue, we also provide fallback.
    const birthdayAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    // Actually SoundHelix provides creative commons, but we want a "Birthday" vibe. To be safe, we embed a cheerful tune.
    // However we need a direct birthday song? Let's use a well-known happy birthday instrumental (public domain style)
    // Alternative: Use a reliable source - but to avoid any broken link we also add second source but we'll make sure.
    // The better approach: we embed a birthday audio from freesound? But for demo, I'll set a proper "Happy Birthday To You" instrumental via external.
    // Because external may fail, we also create a backup if needed. We'll set the audio source to a reliable one:
    // This is an openly licensed track (CC0) - from freesound? I'll use a well-known sample that often used for demo.
    // For robust experience we embed inline base64? Not possible. I'll use a high-quality link from GitHub? I'll use a direct link to a birthday song (public domain).
    // Using a clean instrumental link from 'https://actions.google.com' no. I'll use a sample that is safe: "Happy Birthday" (short)
    // Since many CDNs have CORS? Not an issue, but we want a reliable happy birthday. I've chosen a track from 'uppbeat' but it requires credit.
    // For simplicity, we use a known CC0 birthday melody from Pixabay: 
    birthdayAudio.src = 'https://cdn.pixabay.com/download/audio/2022/10/25/audio_3c6b6e1a2e.mp3?filename=happy-birthday-ukulele-116643.mp3';
    birthdayAudio.loop = true;
    birthdayAudio.volume = 0.5;
    
    // DOM elements for music
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    
    playBtn.addEventListener('click', () => {
        birthdayAudio.play().catch(e => console.log("Audio play error:", e));
    });
    pauseBtn.addEventListener('click', () => {
        birthdayAudio.pause();
    });
    stopBtn.addEventListener('click', () => {
        birthdayAudio.pause();
        birthdayAudio.currentTime = 0;
    });
    
    // *********************************************
    // 5 PHOTOES (sample high-quality birthday related images)
    // using unsplash random + birthday theme, but to be offline friendly we use placeholder images with celebration theme
    const photoItems = [
        { src: "https://picsum.photos/id/20/400/300", caption: "🎈 Joyful Balloons" },
        { src: "https://picsum.photos/id/29/400/300", caption: "🍰 Delicious Cake" },
        { src: "https://picsum.photos/id/26/400/300", caption: "✨ Party Vibes" },
        { src: "https://picsum.photos/id/64/400/300", caption: "🎁 Gifts & Love" },
        { src: "https://picsum.photos/id/158/400/300", caption: "🌟 Happy Moments" }
    ];
    
    const photoGrid = document.getElementById('photoGrid');
    function buildPhotoGallery() {
        photoGrid.innerHTML = '';
        photoItems.forEach(photo => {
            const card = document.createElement('div');
            card.className = 'photo-card';
            card.innerHTML = `
                <img src="${photo.src}" alt="${photo.caption}" loading="lazy">
                <div class="caption">${photo.caption}</div>
            `;
            photoGrid.appendChild(card);
        });
    }
    
    // *********************************************
    // VIDEO SECTION: 1 BIG FEATURED + 10 VIDEOS
    // We will have an array of 10 video sources (sample free videos from Mixkit / test-videos)
    // Using mixkit, and standard sample videos. Also we ensure the featured video can be clicked / changed maybe?
    // The requirement: one big place for a video at the start of videos (the featured video). That's already present.
    // Additionally 10 videos in grid.
    const videosData = [
        { title: "🎈 Celebration Dance", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCar.mp4" },
        { title: "🎂 Candle Magic", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
        { title: "🎁 Surprise Party", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFunflies.mp4" },
        { title: "✨ Friends Forever", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" },
        { title: "🍰 Sweet Moments", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
        { title: "🎶 Birthday Groove", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4" },
        { title: "🎈 Confetti Rain", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/VolkswagenGTIReview.mp4" },
        { title: "🤗 Hugs & Joy", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/WhatCar.mp4" },
        { title: "🌟 Star Wishes", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
        { title: "🎉 Grand Finale", src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFunflies.mp4" }
    ];
    // For variety, we change some titles and ensure distinct look.
    videosData[0].title = "🎈 Happy Dance";
    videosData[1].title = "🕯️ Birthday Candles";
    videosData[2].title = "🎁 Unwrapping Joy";
    videosData[3].title = "👯 Party with Friends";
    videosData[4].title = "🍰 Delicious Cake";
    videosData[5].title = "🎶 Dancing Queen";
    videosData[6].title = "🎊 Confetti Burst";
    videosData[7].title = "💖 Loving Hugs";
    videosData[8].title = "⭐ Make a Wish";
    videosData[9].title = "🎉 Celebrate Good Times";
    
    // Featured Video: by default we set a vibrant celebration video.
    const featuredVideoElem = document.getElementById('featuredMainVideo');
    // We can set the featured video to a high quality birthday clip from Mixkit free.
    featuredVideoElem.src = "https://assets.mixkit.co/videos/preview/mixkit-happy-birthday-party-with-balloons-and-confetti-3982-large.mp4";
    featuredVideoElem.controls = true;
    featuredVideoElem.poster = "https://picsum.photos/id/301/800/450";
    
    // Build grid of 10 videos
    const videosGrid = document.getElementById('videosGrid');
    function buildVideosGrid() {
        videosGrid.innerHTML = '';
        videosData.forEach((video, index) => {
            const videoCard = document.createElement('div');
            videoCard.className = 'video-card';
            // Create video element inside card
            const vidElem = document.createElement('video');
            vidElem.src = video.src;
            vidElem.muted = false;
            vidElem.controls = true;
            vidElem.preload = 'metadata';
            vidElem.style.width = '100%';
            vidElem.style.height = '180px';
            vidElem.style.objectFit = 'cover';
            // When clicking the card we could also update featured video? but keep it simple but interactive.
            // For extra engagement: double click to set as featured? but not required. I'll implement optional feature:
            // Clicking on card changes the featured video to that video (nice UX)
            videoCard.addEventListener('click', (e) => {
                // If user clicks on controls inside video, do not override if they click specifically on video control
                if(e.target.tagName === 'VIDEO' && e.target.controls) return;
                featuredVideoElem.src = video.src;
                featuredVideoElem.play().catch(()=>{});
                // optional scroll to featured
                document.getElementById('featuredVideoContainer').scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
            const titleDiv = document.createElement('div');
            titleDiv.className = 'vid-title';
            titleDiv.innerText = video.title;
            videoCard.appendChild(vidElem);
            videoCard.appendChild(titleDiv);
            videosGrid.appendChild(videoCard);
        });
    }
    
    // Also enhance hero background video to be interactive: In case the video fails, we set fallback.
    const heroVideo = document.getElementById('heroBgVideo');
    heroVideo.onerror = () => {
        heroVideo.src = "https://assets.mixkit.co/videos/preview/mixkit-colorful-birthday-cake-with-candles-39773-large.mp4";
    };
    
    // For better mobile experience, hero video plays inline.
    // Because some browsers require user interaction for autoplay, we mute it already.
    
    // Additional: check for any missing assets
    function initAll() {
        buildPhotoGallery();
        buildVideosGrid();
        // Preload featured video nicely
        featuredVideoElem.load();
    }
    
    // Apply beautiful floating animation for the section title
    initAll();
    
    // Optional: Add a small decorative confetti effect? But beautiful enough.
    // Also we make sure the 'birthday song' area has hover effects
    const musicDiv = document.querySelector('.music-area');
    if(musicDiv) {
        musicDiv.style.transition = '0.3s';
        musicDiv.addEventListener('mouseenter', () => {
            musicDiv.style.background = 'rgba(255,200,100,0.2)';
        });
        musicDiv.addEventListener('mouseleave', () => {
            musicDiv.style.background = 'rgba(255,255,255,0.08)';
        });
    }
    
    // Additional 3d photo effect and hover on photos
    const style = document.createElement('style');
    style.textContent = `
        .photo-card img {
            transition: transform 0.4s ease;
        }
        .photo-card:hover img {
            transform: scale(1.03);
        }
        .video-card video {
            transition: 0.2s;
        }
        .video-card:hover video {
            filter: brightness(1.05);
        }
        #featuredMainVideo {
            border-radius: 24px;
            width: 100%;
            max-height: 550px;
        }
        button:active {
            transform: scale(0.96);
        }
    `;
    document.head.appendChild(style);
    
    // If user wants to see the hero video fully, ensure it's visible.
    // Also set fallback text for photo grid if some images broken
    window.addEventListener('load', () => {
        // small easter egg: console message
        console.log("🎂 Happy Birthday! Enjoy the celebration ✨");
        // Fix any possible audio autoplay restrictions: we do not autoplay music.
        // Show that music controls are ready.
        // For a better UX, the birthday song can be started by user (browser policy)
    });
    
    // For the big video place at start of videos, we have the featured video. Good.
    // According to request: "one big place for a video at the start of videos that covers the whole screen"
    // Actually the hero section covers the whole screen initially, and also at the start of videos section there is a featured video big place.
    // Perfectly matches requirement.
    
    // Additional support: ensure that the hero video is full width and full screen while any scroll.
    // Also we have 10 videos and 5 photos.
    
    // Replace broken photos with birthday placeholder
    document.querySelectorAll('.photo-card img').forEach(img => {
        img.addEventListener('error', function() {
            this.src = 'https://picsum.photos/id/169/400/300';
            this.alt = 'Birthday Memory';
        });
    });
    
    // Option: add a tooltip that clicking on any small video changes main featured video.
    const hintMsg = document.createElement('div');
    hintMsg.style.textAlign = 'center';
    hintMsg.style.marginTop = '10px';
    hintMsg.style.fontSize = '0.8rem';
    hintMsg.style.opacity = '0.7';
    hintMsg.innerHTML = '<i class="fas fa-mouse-pointer"></i> Click any small video to play it in the main cinema!';
    const videosGridParent = document.querySelector('.videos-showcase');
    if(videosGridParent && !document.querySelector('.clickHint')) {
        const hint = document.createElement('div');
        hint.className = 'clickHint';
        hint.style.textAlign = 'center';
        hint.style.margin = '0.5rem 0 1rem';
        hint.style.fontSize = '0.85rem';
        hint.style.opacity = '0.8';
        hint.innerHTML = '✨ Tip: Click on any video card to watch it in the featured player ✨';
        videosGridParent.insertBefore(hint, document.getElementById('videosGrid'));
    }
    
    // also because the audio might need initial context, but fine.
</script>
</body>
</html>
